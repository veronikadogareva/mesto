<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesto</title>
    <link rel="stylesheet" href="./pages/index.css" />
</head>

<body class="body">
    <div class="page">
        <header class="header">
            <img class="header__logo" src="./images/logo.svg" alt="логотип сайта надпись Место(Россия)">
        </header>
        <main class="content">
            <section class="profile">
                <img class="profile__avatar" src="./images/image.jpg" alt="фотография Жака-Ив Кусто в красной шапке">
                <div class="profile__info">
                    <div class="profile__nowrap">
                        <h1 class="profile__name">Жак-Ив Кусто</h1>
                        <button class="profile__edit-button" type="button"></button>
                    </div>
                    <h2 class="profile__description">Исследователь океана</h2>
                </div>
                <button class="profile__add-button" type="button"></button>
            </section>
            <ul class="elements">
            </ul>
        </main>
        <footer class="footer">
            <p class="footer__copyright">© 2023 Mesto Russia</p>
        </footer>
        <section class="popup">
            <div class="popup__container">
                <button class="popup__close" type="button"></button>
                <h2 class="popup__title">Редактировать профиль</h2>
                <form class="popup__form" name="form-profile" method="post" action="mailto:veronika.dogareva@yandex.ru">
                    <input class="popup__input popup__input_info_name" name="profile-name" value="Жак-Ив Кусто">
                    <input class="popup__input popup__input_info_description" name="profile-description"
                        value="Исследователь океана">
                    <button class="popup__save" type="submit">Сохранить</button>
                </form>
            </div>
        </section>
        <section class="popup popup_type_edit">
            <div class="popup__container">
                <button class="popup__close" type="button"></button>
                <h2 class="popup__title">Редактировать профиль</h2>
                <form class="popup__form" name="form-profile" method="post" action="mailto:veronika.dogareva@yandex.ru">
                    <input class="popup__input popup__input_info_name" name="profile-name" value="Жак-Ив Кусто">
                    <input class="popup__input popup__input_info_description" name="profile-description"
                        value="Исследователь океана">
                    <button class="popup__save" type="submit">Сохранить</button>
                </form>
            </div>
        </section>
        <section class="popup popup_type_card">
            <div class="popup__container">
                <button class="popup__close" type="button"></button>
                <h2 class="popup__title">Новое место</h2>
                <form class="popup__form" name="form-new-place" method="post" action="#">
                    <input class="popup__input popup__input_info_title" name="card-title" placeholder="Название">
                    <input class="popup__input popup__input_info_link" name="card-link"
                        placeholder="Ссылка на картинку">
                    <button class="popup__save" type="submit">Создать</button>
                </form>
            </div>
        </section>
        <section class="popup popup_type_image">
            <figure class="popup__container popup__container_type_image">
                <button class="popup__close" type="button"></button>
                <img class="popup__image" alt="изображение места с карточки" src=" ">
                <figcaption class="popup__figurcaption">Лалала</figcaption>
            </figure>
        </section>
    </div>
    <template id="element">
        <li class="element">
            <img class="element__image">
            <div class="element__group">
                <h2 class="element__place"></h2>
                <button class="element__icon" type="button"></button>
            </div>
            <button class="element__trash" type="button"></button>
        </li>
    </template>
    <script src="./scripts/index.js"></script>
</body>

</html>
